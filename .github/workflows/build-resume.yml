name: Generate and Deploy PDF Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Installs your packages (including the correct Chromium binary version matched to your package.json)
      - name: Install Dependencies
        run: npm install

      # This marketplace action sets up the virtual frame buffer and execution path hooks
      - name: Run Puppeteer Layout Compiler in Headless Environment
        uses: mujo-code/puppeteer-headful@v4
        with:
          action: node src/render.js cv.json --output cv

      - name: Upload PDF to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dominick-Robinson-Resume
          path: dist/cv/DOMINICK_ROBINSON_RESUME.pdf