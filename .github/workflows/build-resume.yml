name: Generate and Deploy PDF Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Gives the runner permission to create a release tag and upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Download Standalone Chrome Binary
        run: npx puppeteer browsers install chrome

      - name: Compile PDF Artifact
        run: node src/render.js --output cv

      # Automatically uploads the newly compiled PDF to a permanent GitHub Release
      - name: Update Public Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Compiled Resume"
          draft: false
          prerelease: false
          files: dist/cv/DOMINICK_ROBINSON_RESUME.pdf